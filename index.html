<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drillions Jarvis</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="panel left-panel">

    <div id="status">AWAITING COMMAND...</div>

    <div class="calendar-widget">
      <div class="calendar-header" id="calHeader"></div>
      <div class="calendar-grid" id="calGrid"></div>
    </div>

  </div>

  <!-- CENTER -->
  <div class="center-area">

    <div class="orb"></div>

    <h1>DRILLIONS // JARVIS</h1>

    <input id="inputBox" placeholder="Type command..." />

    <button id="sendBtn">Send</button>

    <div id="terminal"></div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right-panel"></div>

</div>

<script src="script.js"></script>

</body>
</html>
